###############################################################################
# Cortex-AI Local Development Stack
#
# Usage:
#   docker compose up -d                  # Start core services
#   docker compose --profile graphrag up -d  # Include Neo4j
#   docker compose down -v                # Tear down with volumes
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex_dev
      POSTGRES_DB: cortex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Caching, sessions, permission cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant — Vector search for RAG
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j — Graph database for GraphRAG (optional, behind profile)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    profiles:
      - graphrag
    environment:
      NEO4J_AUTH: neo4j/cortex_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p cortex_dev 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Cortex-AI API server
  # ---------------------------------------------------------------------------
  cortex-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cortex:cortex_dev@postgres:5432/cortex
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: '["http://localhost:5177","http://localhost:3000"]'

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  neo4jdata:
