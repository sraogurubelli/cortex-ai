replicaCount: 2

image:
  repository: cortex-ai
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: cortex-ai.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  API_WORKERS: "4"

envSecrets:
  SECRET_KEY: cortex-secrets
  JWT_SECRETS: cortex-secrets
  DATABASE_URL: cortex-secrets
  REDIS_URL: cortex-secrets
  OPENAI_API_KEY: cortex-secrets

probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  startup:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

worker:
  enabled: false
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
