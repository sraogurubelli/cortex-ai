version: '3'

vars:
  VENV_PYTHON: .venv/bin/python
  VENV_PIP: .venv/bin/pip

tasks:
  # =========================================================================
  # Setup & Environment Tasks
  # =========================================================================

  ensure-venv:
    desc: Create .venv with Python 3.11 if it does not exist
    cmds:
      - |
        if [ -d .venv ]; then
          echo "✅ .venv already exists"
        elif command -v python3.11 >/dev/null 2>&1; then
          python3.11 -m venv .venv
          echo "✅ Created .venv with python3.11"
        else
          echo "❌ python3.11 not found. Install with: brew install python@3.11"
          exit 1
        fi
    status:
      - test -d .venv

  install:
    desc: Install dependencies
    deps: [ensure-venv]
    cmds:
      - '{{.VENV_PYTHON}} -c "import sys; assert sys.version_info >= (3, 11), f''cortex-ai requires Python 3.11+. Current: {sys.version}''"'
      - '{{.VENV_PIP}} install -e ".[all-dev]"'
      - '{{.VENV_PYTHON}} -m pre_commit install || true'
    sources:
      - pyproject.toml
      - requirements.txt
    generates:
      - .venv/bin/uvicorn

  setup:
    desc: Complete development environment setup
    deps: [install, docker:up]
    cmds:
      - echo "✅ Development environment ready!"
      - echo "Run 'task dev' to start the development server"

  fresh:
    desc: Cleanup everything and setup (reset Docker, install deps, ready for task dev)
    cmds:
      - echo "🔄 Starting fresh development environment..."
      - task: ensure-venv
      - task: docker:reset
      - task: setup
      - echo "✅ Fresh environment ready!"
      - echo "   Run 'task dev' to run migrations and start the server"

  clean:
    desc: Clean build artifacts and cache
    cmds:
      - rm -rf build/ dist/ *.egg-info
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - find . -type f -name "*.pyc" -delete 2>/dev/null || true
      - find . -type d -name .pytest_cache -exec rm -rf {} + 2>/dev/null || true
      - find . -type d -name .ruff_cache -exec rm -rf {} + 2>/dev/null || true
      - find . -type d -name .mypy_cache -exec rm -rf {} + 2>/dev/null || true
      - rm -rf htmlcov/ .coverage coverage.xml
      - echo "✅ Cleaned build artifacts and cache"

  # =========================================================================
  # Code Quality Tasks
  # =========================================================================

  format:
    desc: Format code with Black and Ruff
    cmds:
      - '{{.VENV_PYTHON}} -m black cortex/ tests/ examples/'
      - '{{.VENV_PYTHON}} -m ruff check --fix cortex/ tests/ examples/'
      - echo "✅ Code formatted"

  lint:
    desc: Run linters (Ruff, Mypy, Bandit)
    cmds:
      - '{{.VENV_PYTHON}} -m ruff check cortex/ tests/ examples/'
      - '{{.VENV_PYTHON}} -m mypy cortex/'
      - '{{.VENV_PYTHON}} -m bandit -r cortex/ -ll'
      - echo "✅ Linting passed"

  type-check:
    desc: Run type checking with Mypy
    cmds:
      - '{{.VENV_PYTHON}} -m mypy cortex/'
      - echo "✅ Type checking passed"

  check:
    desc: Run all code quality checks
    deps: [lint]
    cmds:
      - echo "✅ All checks passed"

  # =========================================================================
  # Testing Tasks
  # =========================================================================

  test:
    desc: Run all tests
    cmds:
      - '{{.VENV_PYTHON}} -m pytest tests/ -v'

  test:unit:
    desc: Run unit tests only
    cmds:
      - '{{.VENV_PYTHON}} -m pytest tests/unit/ -v -m "not slow"'

  test:integration:
    desc: Run integration tests
    cmds:
      - '{{.VENV_PYTHON}} -m pytest tests/integration/ -v'

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - '{{.VENV_PYTHON}} -m pytest tests/ --cov=cortex --cov-report=html --cov-report=term --cov-branch'
      - echo "✅ Coverage report generated in htmlcov/"

  test:watch:
    desc: Run tests in watch mode (requires pytest-watch)
    cmds:
      - '{{.VENV_PYTHON}} -m ptw tests/ -- -v'

  test:quick:
    desc: Run quick unit tests (no slow tests)
    cmds:
      - '{{.VENV_PYTHON}} -m pytest tests/unit/ -v -m "not slow" -x'

  # =========================================================================
  # Development Server Tasks
  # =========================================================================

  dev:
    desc: Run migrations and start development server
    cmds:
      - task: db:migrate
      - echo "🚀 Starting development server on http://localhost:8000"
      - exec {{.VENV_PYTHON}} -m cortex.api.main

  dev:debug:
    desc: Run development server with debugging enabled
    env:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    cmds:
      - exec {{.VENV_PYTHON}} -m cortex.api.main

  # =========================================================================
  # Docker Tasks
  # =========================================================================

  docker:up:
    desc: Start Docker services (PostgreSQL, Redis, Qdrant)
    cmds:
      - docker compose up -d postgres redis qdrant
      - echo "Waiting for services to be ready..."
      - sleep 5
      - echo "✅ Docker services started"

  docker:down:
    desc: Stop Docker services
    cmds:
      - docker compose down
      - echo "✅ Docker services stopped"

  docker:logs:
    desc: View Docker service logs
    cmds:
      - docker compose logs -f

  docker:ps:
    desc: Show running Docker services
    cmds:
      - docker compose ps

  docker:reset:
    desc: Reset Docker volumes (WARNING - destroys data)
    prompt: This will delete all data in Docker volumes. Continue?
    cmds:
      - docker compose down -v
      - docker compose up -d postgres redis qdrant
      - sleep 5
      - echo "✅ Docker volumes reset"

  docker:pull:
    desc: Pull latest Docker images
    cmds:
      - docker compose pull

  # =========================================================================
  # Database Tasks
  # =========================================================================

  db:migrate:
    desc: Run database migrations (Alembic - creates tables)
    cmds:
      - '{{.VENV_PYTHON}} -m alembic upgrade head'
      - echo "✅ Database migrations completed"

  db:shell:
    desc: Open PostgreSQL shell
    cmds:
      - docker compose exec postgres psql -U cortex -d cortex

  db:dump:
    desc: Dump database to dump.sql
    cmds:
      - docker compose exec postgres pg_dump -U cortex cortex > dump.sql
      - echo "✅ Database dumped to dump.sql"

  db:restore:
    desc: Restore database from dump.sql
    cmds:
      - docker compose exec -T postgres psql -U cortex cortex < dump.sql
      - echo "✅ Database restored from dump.sql"

  db:reset:
    desc: Reset database (drop and recreate)
    prompt: This will delete all data in the database. Continue?
    cmds:
      - docker compose exec postgres psql -U cortex -d postgres -c "DROP DATABASE IF EXISTS cortex;"
      - docker compose exec postgres psql -U cortex -d postgres -c "CREATE DATABASE cortex;"
      - task: db:migrate
      - echo "✅ Database reset"

  # =========================================================================
  # Demo & Examples Tasks
  # =========================================================================

  demo:
    desc: Run platform demo (signup, create org, chat)
    cmds:
      - echo "Starting platform demo..."
      - echo "Make sure the server is running with 'task dev' in another terminal"
      - '{{.VENV_PYTHON}} examples/platform_demo.py'

  demo:graphrag:
    desc: Run GraphRAG demo
    cmds:
      - echo "Starting GraphRAG demo..."
      - echo "Make sure the server is running with 'task dev' in another terminal"
      - '{{.VENV_PYTHON}} examples/test_graphrag_mvp.py'

  # =========================================================================
  # Utility Tasks
  # =========================================================================

  pre-commit:
    desc: Run pre-commit hooks on all files
    cmds:
      - '{{.VENV_PYTHON}} -m pre_commit run --all-files'

  pre-commit:update:
    desc: Update pre-commit hooks
    cmds:
      - '{{.VENV_PYTHON}} -m pre_commit autoupdate'
      - echo "✅ Pre-commit hooks updated"

  list:
    desc: List all available tasks
    cmds:
      - task --list

  help:
    desc: Show help information
    cmds:
      - echo "Cortex-AI Development Tasks"
      - echo ""
      - echo "Quick Start:"
      - echo "  task fresh        - Cleanup everything (reset Docker, install deps)"
      - echo "  task dev          - Run migrations + start server (normal workflow)"
      - echo ""
      - echo "Typical Workflow:"
      - echo "  1. First time -> task fresh, then task dev"
      - echo "  2. Daily dev -> task dev (runs migrations + starts server)"
      - echo "  3. After changes -> Ctrl+C, then task dev again"
      - echo ""
      - echo "Database:"
      - echo "  task db:migrate   - Run Alembic migrations only"
      - echo "  task db:reset     - Drop and recreate database"
      - echo "  task db:shell     - Open PostgreSQL shell"
      - echo ""
      - echo "Code Quality:"
      - echo "  task format       - Format code with Black and Ruff"
      - echo "  task lint         - Run linters (Ruff, Mypy, Bandit)"
      - echo "  task test         - Run all tests"
      - echo ""
      - echo "Docker:"
      - echo "  task docker:up    - Start Docker services"
      - echo "  task docker:down  - Stop Docker services"
      - echo ""
      - echo "Run 'task --list' for all available tasks"

  # =========================================================================
  # CI/CD Helper Tasks
  # =========================================================================

  ci:test:
    desc: Run CI test suite (same as GitHub Actions)
    deps: [docker:up]
    cmds:
      - '{{.VENV_PYTHON}} -m pytest tests/ -v --cov=cortex --cov-report=xml --cov-report=term'

  ci:lint:
    desc: Run CI lint checks (same as GitHub Actions)
    cmds:
      - '{{.VENV_PYTHON}} -m ruff check cortex/ tests/ examples/'
      - '{{.VENV_PYTHON}} -m black --check cortex/ tests/ examples/'
      - '{{.VENV_PYTHON}} -m mypy cortex/'
      - '{{.VENV_PYTHON}} -m bandit -r cortex/ -ll'

  ci:all:
    desc: Run all CI checks locally
    cmds:
      - task: ci:lint
      - task: ci:test
      - echo "✅ All CI checks passed"
