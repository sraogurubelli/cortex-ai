# Nginx Load Balancer Configuration for Cortex-AI
#
# Features:
# - Session affinity (ip_hash) for WebSocket connections
# - Health checks
# - SSL/TLS termination
# - WebSocket upgrade headers
# - Request buffering controls
#
# Usage:
#   docker run -d --name nginx -p 80:80 -p 443:443 \
#     -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro \
#     nginx:alpine

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-component text/x-cross-domain-policy;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream API servers (Phase 4: Horizontal scaling)
    upstream cortex_api {
        # Session affinity for WebSocket (ip_hash)
        # Alternative: hash $cookie_session_id consistent;
        ip_hash;

        # API instances
        server api1:8000 max_fails=3 fail_timeout=30s;
        server api2:8000 max_fails=3 fail_timeout=30s;
        server api3:8000 max_fails=3 fail_timeout=30s;

        # Health check (requires nginx-plus or custom module)
        # health_check interval=10s fails=3 passes=2;

        # Keepalive connections to upstreams
        keepalive 32;
    }

    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name api.cortex.ai;

        # Redirect HTTP to HTTPS (production)
        # return 301 https://$server_name$request_uri;

        # Client upload size
        client_max_body_size 10M;

        # Timeouts
        client_body_timeout 60s;
        client_header_timeout 60s;
        send_timeout 60s;

        # ================================================================
        # WebSocket endpoints (with session affinity)
        # ================================================================
        location /api/v1/ws/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            # Proxy to upstream
            proxy_pass http://cortex_api;

            # WebSocket upgrade headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Forwarding headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # WebSocket timeouts (long-lived connections)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;

            # Disable buffering for WebSocket
            proxy_buffering off;

            # Health check passthrough
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        }

        # ================================================================
        # SSE streaming endpoints
        # ================================================================
        location /api/v1/chat/stream {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy to upstream
            proxy_pass http://cortex_api;

            # SSE headers
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;

            # Forwarding headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;

            # Disable buffering for SSE
            proxy_buffering off;
            proxy_cache off;

            # Disable gzip for SSE (breaks streaming)
            gzip off;
        }

        # ================================================================
        # Regular API endpoints (REST)
        # ================================================================
        location /api/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 50;

            # Proxy to upstream
            proxy_pass http://cortex_api;

            # Forwarding headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Standard timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering (enabled for REST)
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Health check passthrough
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        }

        # ================================================================
        # Health check endpoint
        # ================================================================
        location /health {
            access_log off;
            proxy_pass http://cortex_api/health;
            proxy_set_header Host $host;
        }

        # ================================================================
        # Metrics endpoint (Prometheus)
        # ================================================================
        location /metrics {
            # Restrict to internal networks (production)
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://cortex_api/metrics;
            proxy_set_header Host $host;
        }

        # ================================================================
        # Static files (if serving frontend)
        # ================================================================
        location / {
            # Serve static files or proxy to frontend server
            # root /usr/share/nginx/html;
            # index index.html;
            # try_files $uri $uri/ /index.html;

            # Or proxy to frontend (e.g., React app)
            # proxy_pass http://frontend:3000;

            return 404;
        }

        # ================================================================
        # Error pages
        # ================================================================
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # SSL/TLS server block (production)
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name api.cortex.ai;
    #
    #     # SSL certificates
    #     ssl_certificate /etc/nginx/ssl/cortex.crt;
    #     ssl_certificate_key /etc/nginx/ssl/cortex.key;
    #
    #     # SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # Include same location blocks as HTTP server
    #     # ...
    # }
}
